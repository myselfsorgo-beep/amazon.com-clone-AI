<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Clone</title>
    <link rel="icon" type="image/png" href="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&w=64&q=80" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header" id="top">
      <div class="top-nav">
        <a href="index.html" class="logo">amazon</a>
        <label class="search-bar" for="search">
          <input id="search" type="text" placeholder="Search for products" />
          <button type="button">Search</button>
        </label>
        <div class="nav-links">
          <a href="cart.html">Cart</a>
        </div>
      </div>
      <nav class="main-nav">
        <a href="#products">Shop</a>
        <a href="#products">Deals</a>
      </nav>
    </header>
  <main>
      <section class="hero">
        <div>
          <h1>Upgrade your everyday essentials</h1>
          <p>Discover curated picks for work, travel, and home comfort in one place.</p>
          <a href="#products" class="cta">Shop now</a>
        </div>
        <div class="hero-card">
          <h2>Featured deal</h2>
          <p>Save on premium accessories and home gadgets with free shipping.</p>
        </div>
      </section>

      <section 
  id="products" class="products-section">
        <div id="products-grid" class="product-grid"></div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Amazon Clone. Designed for demo purposes.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
